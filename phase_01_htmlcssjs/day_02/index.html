<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h3 {
            color: red;
        }

        button {
            /* background-color: blue; */
            /* color: white; */
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>

</head>

<body>
    <h1>DOM 1</h1>
    <h3>Welcome To my Webpage</h3>
    <button id="sub">exit</button>
</body>

</html>
<script>
    var btn = document.querySelector("#sub")
    btn.addEventListener("click", eventButton)
    var flag = false
    function eventButton() {
        // alert("You clicked the button");
        flag = !flag
        if (flag) {

            var h3 = document.querySelector("h3")
            h3.innerText = "Thanks for clicking the button . YOHO HO HO!"
            btn.innerText = "Welcome"
            h3.style.color = "green"
        }
        else {
            var h3 = document.querySelector("h3")
            h3.innerText = "Welcome To my Webpage"
            btn.innerText = "exit"
            h3.style.color = "red"
        }
    }

</script>
